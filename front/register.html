<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 — 智慧养老AI辅助平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        warm: {
                            50: '#eff6ff',
                            100: '#dbeafe',
                            200: '#bfdbfe',
                            300: '#93c5fd',
                            400: '#60a5fa',
                            500: '#3b82f6',
                            600: '#1d4ed8',
                            700: '#1e40af',
                            800: '#1e3a8a',
                            900: '#172554',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Noto Sans SC', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #dbeafe 0%, #eff6ff 50%, #e0e7ff 100%);
            min-height: 100vh;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-md">
        <!-- 品牌标题 -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-warm-500 rounded-2xl shadow-lg mb-4">
                <span class="text-3xl">🏡</span>
            </div>
            <h1 class="text-2xl font-extrabold text-warm-800 tracking-wide">智慧养老AI辅助平台</h1>
            <p class="text-sm text-warm-400 mt-1">创建账号，开启智慧养老服务</p>
        </div>

        <!-- 注册卡片 -->
        <div class="bg-white rounded-3xl shadow-xl border border-warm-100 p-8">
            <h2 class="text-xl font-bold text-warm-700 mb-6 text-center">用户注册</h2>

            <!-- 成功提示 -->
            <div id="success-box" class="hidden mb-4 p-4 bg-emerald-50 border border-emerald-200 rounded-xl text-center">
                <p class="text-emerald-700 text-sm font-bold mb-2">&#127881; 注册成功！</p>
                <a href="login.html" class="inline-block text-sm text-emerald-600 hover:text-emerald-800 font-bold underline underline-offset-2 transition-colors">
                    前往登录页面 &rarr;
                </a>
            </div>

            <!-- 错误提示 -->
            <div id="error-box" class="hidden mb-4 p-3 bg-red-50 border border-red-200 text-red-700 text-sm rounded-xl"></div>

            <form id="register-form" class="space-y-5">
                <div>
                    <label for="username" class="block text-sm font-bold text-warm-600 mb-1.5">用户名</label>
                    <input
                        id="username"
                        type="text"
                        required
                        autocomplete="username"
                        placeholder="4-20个字符"
                        minlength="4"
                        maxlength="20"
                        class="w-full px-4 py-3 border border-warm-200 rounded-xl text-sm outline-none focus:ring-2 focus:ring-warm-400 focus:border-warm-400 transition-all bg-warm-50/50 placeholder:text-warm-300"
                    >
                </div>

                <div>
                    <label for="password" class="block text-sm font-bold text-warm-600 mb-1.5">密码</label>
                    <input
                        id="password"
                        type="password"
                        required
                        autocomplete="new-password"
                        placeholder="至少4个字符"
                        minlength="4"
                        class="w-full px-4 py-3 border border-warm-200 rounded-xl text-sm outline-none focus:ring-2 focus:ring-warm-400 focus:border-warm-400 transition-all bg-warm-50/50 placeholder:text-warm-300"
                    >
                </div>

                <div>
                    <label for="confirm-password" class="block text-sm font-bold text-warm-600 mb-1.5">确认密码</label>
                    <input
                        id="confirm-password"
                        type="password"
                        required
                        autocomplete="new-password"
                        placeholder="请再次输入密码"
                        class="w-full px-4 py-3 border border-warm-200 rounded-xl text-sm outline-none focus:ring-2 focus:ring-warm-400 focus:border-warm-400 transition-all bg-warm-50/50 placeholder:text-warm-300"
                    >
                    <p id="match-hint" class="hidden text-xs text-red-500 mt-1">两次输入的密码不一致</p>
                </div>

                <div>
                    <label for="phone" class="block text-sm font-bold text-warm-600 mb-1.5">
                        手机号
                        <span class="text-warm-300 font-normal">（选填）</span>
                    </label>
                    <input
                        id="phone"
                        type="tel"
                        autocomplete="tel"
                        placeholder="请输入手机号"
                        class="w-full px-4 py-3 border border-warm-200 rounded-xl text-sm outline-none focus:ring-2 focus:ring-warm-400 focus:border-warm-400 transition-all bg-warm-50/50 placeholder:text-warm-300"
                    >
                </div>

                <button
                    id="submit-btn"
                    type="submit"
                    class="w-full bg-warm-500 hover:bg-warm-600 active:bg-warm-700 text-white font-bold py-3 rounded-xl shadow-md hover:shadow-lg transition-all text-sm disabled:opacity-60 disabled:cursor-not-allowed"
                >
                    注 册
                </button>
            </form>

            <p class="text-center text-xs text-warm-400 mt-6">
                已有账号？
                <a href="login.html" class="text-warm-500 hover:text-warm-700 font-bold underline underline-offset-2 transition-colors">
                    立即登录
                </a>
            </p>
        </div>

        <!-- 页脚 -->
        <p class="text-center text-xs text-warm-300 mt-6">
            &copy; 2026 智慧养老AI辅助平台 &middot; 孝心常在
        </p>
    </div>

    <script src="shared.js"></script>
    <script>
        (function () {
            var form = document.getElementById("register-form");
            var errorBox = document.getElementById("error-box");
            var successBox = document.getElementById("success-box");
            var submitBtn = document.getElementById("submit-btn");
            var matchHint = document.getElementById("match-hint");
            var passwordInput = document.getElementById("password");
            var confirmInput = document.getElementById("confirm-password");

            function showError(msg) {
                errorBox.textContent = msg;
                errorBox.classList.remove("hidden");
                successBox.classList.add("hidden");
            }

            function hideError() {
                errorBox.classList.add("hidden");
            }

            function showSuccess() {
                successBox.classList.remove("hidden");
                errorBox.classList.add("hidden");
                form.classList.add("hidden");
            }

            function checkPasswordMatch() {
                var pw = passwordInput.value;
                var cpw = confirmInput.value;
                if (cpw.length > 0 && pw !== cpw) {
                    matchHint.classList.remove("hidden");
                } else {
                    matchHint.classList.add("hidden");
                }
            }

            passwordInput.addEventListener("input", checkPasswordMatch);
            confirmInput.addEventListener("input", checkPasswordMatch);

            form.addEventListener("submit", async function (e) {
                e.preventDefault();
                hideError();

                var username = document.getElementById("username").value.trim();
                var password = passwordInput.value;
                var confirmPassword = confirmInput.value;
                var phone = document.getElementById("phone").value.trim() || null;

                // 前端校验：用户名长度
                if (username.length < 4) {
                    showError("用户名至少需要4个字符");
                    return;
                }

                // 前端校验：密码长度
                if (password.length < 4) {
                    showError("密码至少需要4个字符");
                    return;
                }

                // 前端校验：两次密码一致
                if (password !== confirmPassword) {
                    showError("两次输入的密码不一致");
                    matchHint.classList.remove("hidden");
                    return;
                }

                // 手机号格式简单校验
                if (phone && !/^1[3-9]\d{9}$/.test(phone)) {
                    showError("请输入有效的手机号码");
                    return;
                }

                submitBtn.disabled = true;
                submitBtn.textContent = "注册中...";

                try {
                    await api("/api/auth/register", {
                        method: "POST",
                        body: { username: username, password: password, phone: phone },
                        auth: false,
                    });

                    showSuccess();
                } catch (err) {
                    if (err.data && err.data.error) {
                        showError(err.data.error);
                    } else {
                        showError(err.message || "注册失败，请稍后重试");
                    }
                } finally {
                    submitBtn.disabled = false;
                    submitBtn.textContent = "注 册";
                }
            });
        })();
    </script>
</body>
</html>
