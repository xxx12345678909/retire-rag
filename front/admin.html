<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理后台 - 智慧养老云平台</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-100 min-h-screen">
<div id="navbar"></div>
<div class="max-w-6xl mx-auto px-4 py-6">
  <!-- 权限检查 -->
  <div id="no-access" class="hidden bg-red-50 border border-red-200 rounded-xl p-8 text-center">
    <p class="text-red-600 font-bold text-lg">🔒 需要管理员权限</p>
    <p class="text-red-500 text-sm mt-2">请使用管理员账号登录</p>
    <a href="login.html" class="inline-block mt-4 bg-red-600 text-white px-6 py-2 rounded-lg font-medium">前往登录</a>
  </div>

  <div id="admin-content" class="hidden">
    <h2 class="text-2xl font-bold text-slate-800 mb-6">🛠️ 管理后台</h2>

    <!-- 统计卡片 -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8" id="stats-cards">
      <div class="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
        <p class="text-xs text-slate-400 font-bold uppercase">问答请求</p>
        <p class="text-2xl font-bold text-blue-600" id="stat-requests">-</p>
      </div>
      <div class="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
        <p class="text-xs text-slate-400 font-bold uppercase">LLM调用</p>
        <p class="text-2xl font-bold text-emerald-600" id="stat-llm">-</p>
      </div>
      <div class="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
        <p class="text-xs text-slate-400 font-bold uppercase">缓存命中率</p>
        <p class="text-2xl font-bold text-amber-600" id="stat-cache">-</p>
      </div>
      <div class="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
        <p class="text-xs text-slate-400 font-bold uppercase">知识库向量</p>
        <p class="text-2xl font-bold text-purple-600" id="stat-kb">-</p>
      </div>
    </div>

    <!-- 功能面板 -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
      <!-- 知识库管理 -->
      <div class="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
        <h3 class="font-bold text-slate-700 mb-4"><i class="fa-solid fa-database text-blue-500 mr-2"></i>知识库管理</h3>
        <div class="space-y-2 text-sm" id="kb-stats">加载中...</div>
        <div class="mt-4 flex gap-2">
          <button onclick="reloadKB()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition-all">🔄 重载知识库</button>
        </div>
        <form id="upload-form" class="mt-4 border-t border-slate-100 pt-4">
          <label class="block text-xs font-bold text-slate-500 mb-1">上传文档</label>
          <div class="flex gap-2">
            <input type="file" id="upload-file" accept=".pdf,.txt,.docx" class="flex-1 text-sm border border-slate-200 rounded-lg px-3 py-2">
            <select id="upload-kb" class="text-sm border border-slate-200 rounded-lg px-3 py-2">
              <option value="policy">政策法规</option>
              <option value="service">养老服务</option>
              <option value="health">健康科普</option>
              <option value="platform">平台操作</option>
            </select>
            <button type="submit" class="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition-all">上传</button>
          </div>
          <p id="upload-msg" class="text-xs mt-2 hidden"></p>
        </form>
      </div>

      <!-- 运行时调试 -->
      <div class="bg-white rounded-xl border border-slate-200 p-5 shadow-sm">
        <h3 class="font-bold text-slate-700 mb-4"><i class="fa-solid fa-chart-line text-emerald-500 mr-2"></i>运行时调试</h3>
        <div id="debug-info" class="text-sm text-slate-500 space-y-1">加载中...</div>
        <div class="mt-4">
          <button onclick="dryRun()" class="bg-slate-600 hover:bg-slate-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition-all">🧪 空跑测试</button>
          <input id="dryrun-query" type="text" placeholder="输入测试问题..." class="ml-2 border border-slate-200 rounded-lg px-3 py-2 text-sm w-48">
        </div>
        <pre id="dryrun-result" class="hidden mt-3 bg-slate-50 rounded-lg p-3 text-xs text-slate-600 overflow-x-auto max-h-60"></pre>
      </div>
    </div>

    <!-- 问答日志 -->
    <div class="bg-white rounded-xl border border-slate-200 p-5 shadow-sm mb-8">
      <h3 class="font-bold text-slate-700 mb-4"><i class="fa-solid fa-list-check text-amber-500 mr-2"></i>问答日志（最近20条）</h3>
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead><tr class="text-left text-xs text-slate-400 font-bold border-b border-slate-100">
            <th class="py-2 pr-2">时间</th><th class="py-2 pr-2">问题</th><th class="py-2 pr-2">意图</th><th class="py-2 pr-2">知识库</th><th class="py-2 pr-2">反馈</th>
          </tr></thead>
          <tbody id="logs-table"><tr><td colspan="5" class="py-4 text-center text-slate-400">加载中...</td></tr></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script src="shared.js"></script>
<script>
const API_BASE = 'http://localhost:8000';

// 权限检查
async function checkAdmin() {
  var token = localStorage.getItem('auth_token');
  if (!token) { document.getElementById('no-access').classList.remove('hidden'); return false; }
  try {
    var user = JSON.parse(atob(token).split(':').slice(1, 3).join(':'));
    if (user && user.role === 'admin') {
      document.getElementById('admin-content').classList.remove('hidden');
      return true;
    }
  } catch(e) {}
  // 尝试 API 验证
  try {
    var u = await authFetch('/api/auth/me');
    if (u && u.role === 'admin') {
      document.getElementById('admin-content').classList.remove('hidden');
      return true;
    }
  } catch(e) {}
  document.getElementById('no-access').classList.remove('hidden');
  return false;
}

// 加载统计
async function loadStats() {
  try {
    var r = await fetch(API_BASE + '/admin/debug/stats');
    var d = await r.json();
    document.getElementById('stat-requests').textContent = d.runtime.requests;
    document.getElementById('stat-llm').textContent = d.runtime.llm_calls;
    document.getElementById('stat-cache').textContent = d.runtime.query_cache.hit_rate;
    var kbTotal = Object.values(d.kb_stats).reduce(function(a,b){return a+b;}, 0);
    document.getElementById('stat-kb').textContent = kbTotal;

    // KB详情
    var html = '';
    for (var k in d.kb_stats) {
      html += '<div class="flex justify-between"><span>'+k+'</span><span class="font-bold">'+d.kb_stats[k]+'条</span></div>';
    }
    document.getElementById('kb-stats').innerHTML = html;

    // 调试信息
    var cache = d.runtime.query_cache;
    document.getElementById('debug-info').innerHTML =
      '<div>缓存：命中'+cache.hits+' / 未命中'+cache.misses+' / 命中率'+cache.hit_rate+'</div>' +
      '<div>LLM失败：'+d.runtime.llm_failures+'</div>' +
      (d.runtime.recent_errors.length ? '<div class="text-red-500">最近错误：'+d.runtime.recent_errors.map(function(e){return e.module}).join(', ')+'</div>' : '');
  } catch(e) {
    document.getElementById('stats-cards').innerHTML = '<p class="text-slate-400 col-span-4">统计加载失败</p>';
  }
}

// 加载日志
async function loadLogs() {
  try {
    var r = await fetch(API_BASE + '/admin/logs?limit=20');
    var d = await r.json();
    var logs = d.data || [];
    var html = '';
    logs.forEach(function(l) {
      html += '<tr class="border-b border-slate-50 hover:bg-slate-50">' +
        '<td class="py-2 pr-2 text-xs text-slate-400">'+(l.timestamp||'').substr(11,8)+'</td>' +
        '<td class="py-2 pr-2 max-w-xs truncate">'+escapeHtml(l.query||'').substr(0,40)+'</td>' +
        '<td class="py-2 pr-2"><span class="text-xs bg-slate-100 px-1.5 py-0.5 rounded">'+(l.intent||'-')+'</span></td>' +
        '<td class="py-2 pr-2 text-xs">'+(l.kb||'-')+'</td>' +
        '<td class="py-2 pr-2">'+(l.feedback===1?'👍':l.feedback===-1?'👎':'-')+'</td>' +
        '</tr>';
    });
    document.getElementById('logs-table').innerHTML = html || '<tr><td colspan="5" class="py-4 text-center text-slate-400">暂无日志</td></tr>';
  } catch(e) {
    document.getElementById('logs-table').innerHTML = '<tr><td colspan="5" class="py-4 text-center text-red-400">加载失败</td></tr>';
  }
}

// KB重载
async function reloadKB() {
  try {
    var r = await fetch(API_BASE + '/admin/kb/reload');
    var d = await r.json();
    alert('知识库重载完成\n' + JSON.stringify(d.stats));
    loadStats();
  } catch(e) { alert('重载失败：'+e.message); }
}

// 文档上传
document.getElementById('upload-form').addEventListener('submit', async function(e) {
  e.preventDefault();
  var file = document.getElementById('upload-file').files[0];
  if (!file) return;
  var formData = new FormData();
  formData.append('file', file);
  formData.append('kb', document.getElementById('upload-kb').value);
  var msgEl = document.getElementById('upload-msg');
  msgEl.classList.remove('hidden');
  msgEl.textContent = '上传中...';
  try {
    var r = await fetch(API_BASE + '/admin/docs/upload', { method: 'POST', body: formData });
    var d = await r.json();
    msgEl.textContent = d.message || '上传成功';
    msgEl.className = 'text-xs mt-2 text-emerald-600';
    loadStats();
  } catch(e) {
    msgEl.textContent = '上传失败：'+e.message;
    msgEl.className = 'text-xs mt-2 text-red-500';
  }
});

// 空跑测试
async function dryRun() {
  var q = document.getElementById('dryrun-query').value.trim();
  if (!q) { alert('请输入测试问题'); return; }
  var pre = document.getElementById('dryrun-result');
  pre.classList.remove('hidden');
  pre.textContent = '测试中...';
  try {
    var r = await fetch(API_BASE + '/admin/debug/dry-run', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({query: q})
    });
    var d = await r.json();
    pre.textContent = JSON.stringify(d, null, 2);
  } catch(e) {
    pre.textContent = '错误：'+e.message;
  }
}

function escapeHtml(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

document.addEventListener('DOMContentLoaded', async function() {
  renderNavbar();
  var ok = await checkAdmin();
  if (ok) { loadStats(); loadLogs(); }
});
</script>
</body>
</html>
