<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户中心 - 智慧养老AI助手</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="shared.js"></script>
</head>
<body class="bg-slate-50 min-h-screen">

    <header class="bg-white border-b border-slate-200 shadow-sm sticky top-0 z-40">
        <div class="max-w-5xl mx-auto px-4 py-4 flex items-center justify-between">
            <a href="产品原型.html" class="flex items-center gap-2 text-blue-600 font-bold text-lg">
                <span class="text-2xl">🏡</span>
                <span>智慧养老云平台</span>
            </a>
            <h1 class="text-slate-700 font-semibold text-lg">用户中心</h1>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 py-8 space-y-8" id="app">

        <section class="bg-white rounded-2xl border border-slate-200 shadow-sm p-6">
            <h2 class="text-lg font-bold text-slate-700 mb-4 pb-2 border-b">个人资料</h2>
            <div class="flex flex-col sm:flex-row items-center gap-6">
                <div class="w-20 h-20 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center text-3xl font-bold shrink-0">
                    <span id="profile-avatar">👤</span>
                </div>
                <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 flex-1 w-full text-sm">
                    <div>
                        <span class="text-slate-400 block text-xs">用户名</span>
                        <span id="profile-username" class="font-bold text-slate-800">加载中...</span>
                    </div>
                    <div>
                        <span class="text-slate-400 block text-xs">手机号</span>
                        <span id="profile-phone" class="font-bold text-slate-800">-</span>
                    </div>
                    <div>
                        <span class="text-slate-400 block text-xs">注册时间</span>
                        <span id="profile-created" class="font-bold text-slate-800">-</span>
                    </div>
                </div>
            </div>
        </section>

        <section class="bg-white rounded-2xl border border-slate-200 shadow-sm p-6">
            <h2 class="text-lg font-bold text-slate-700 mb-4 pb-2 border-b">家属账号绑定</h2>
            <form id="family-bind-form" class="grid grid-cols-1 md:grid-cols-4 gap-4 items-end">
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1">姓名</label>
                    <input id="family-name" type="text" required class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-500" placeholder="请输入家属姓名">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1">手机号</label>
                    <input id="family-phone" type="text" required class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-500" placeholder="请输入家属手机号">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1">关系</label>
                    <select id="family-relation" required class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm bg-slate-50 focus:outline-none focus:border-blue-500">
                        <option value="父母">父母</option>
                        <option value="配偶">配偶</option>
                        <option value="其他">其他</option>
                    </select>
                </div>
                <div>
                    <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 rounded-lg text-sm shadow transition-all">确认绑定</button>
                </div>
            </form>
            <p id="bind-message" class="text-xs mt-3 hidden"></p>
        </section>

        <section class="bg-white rounded-2xl border border-slate-200 shadow-sm p-6">
            <h2 class="text-lg font-bold text-slate-700 mb-4 pb-2 border-b">已绑定家属成员</h2>
            <div id="family-list-container">
                <div id="family-list" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                    <p class="text-slate-400 text-sm col-span-full text-center py-6">加载中...</p>
                </div>
                <p id="family-empty" class="text-slate-400 text-sm text-center py-6 hidden">暂无绑定的家属成员</p>
            </div>
        </section>

        <section class="bg-white rounded-2xl border border-slate-200 shadow-sm p-6">
            <h2 class="text-lg font-bold text-slate-700 mb-4 pb-2 border-b">我的订单（最近5条）</h2>
            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm border-collapse">
                    <thead>
                        <tr class="bg-slate-50 text-slate-500 font-bold border-b">
                            <th class="p-3 whitespace-nowrap">订单编号</th>
                            <th class="p-3 whitespace-nowrap">服务类型</th>
                            <th class="p-3 whitespace-nowrap">服务对象</th>
                            <th class="p-3 whitespace-nowrap">预约时间</th>
                            <th class="p-3 whitespace-nowrap">状态</th>
                        </tr>
                    </thead>
                    <tbody id="orders-table-body" class="divide-y text-slate-600">
                        <tr><td colspan="5" class="p-3 text-center text-slate-400">加载中...</td></tr>
                    </tbody>
                </table>
            </div>
            <p id="orders-empty" class="text-slate-400 text-sm text-center py-4 hidden">暂无订单记录</p>
        </section>

        <section class="bg-white rounded-2xl border border-slate-200 shadow-sm p-6">
            <h2 class="text-lg font-bold text-slate-700 mb-4 pb-2 border-b">快捷入口</h2>
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <a href="health.html" class="flex items-center gap-3 p-4 rounded-xl border border-slate-200 hover:border-emerald-400 hover:shadow-sm transition-all group">
                    <span class="p-3 bg-emerald-50 rounded-xl text-emerald-600 text-xl group-hover:scale-110 transition-transform">📋</span>
                    <div>
                        <h3 class="font-bold text-slate-700">健康档案</h3>
                        <p class="text-xs text-slate-400">查看与管理老人健康档案、用药提醒</p>
                    </div>
                </a>
                <div class="flex items-center gap-3 p-4 rounded-xl border border-slate-200 bg-slate-50 cursor-not-allowed">
                    <span class="p-3 bg-amber-50 rounded-xl text-amber-400 text-xl">⭐</span>
                    <div>
                        <h3 class="font-bold text-slate-400">我的收藏</h3>
                        <p class="text-xs text-slate-300">即将上线</p>
                    </div>
                </div>
            </div>
        </section>

        <section class="text-center pb-8">
            <button onclick="logout()" class="bg-red-500 hover:bg-red-600 text-white font-bold px-8 py-3 rounded-lg shadow transition-all text-sm">退出登录</button>
        </section>

    </main>

    <div id="toast" class="fixed top-24 left-1/2 transform -translate-x-1/2 z-50 bg-slate-900 text-white px-6 py-3 rounded-full shadow-lg text-xs font-semibold hidden"></div>

    <script>
    (function() {
        if (!isLoggedIn()) {
            window.location.href = 'login.html';
        }
    })();

    function showToast(text, isError) {
        var el = document.getElementById('toast');
        el.textContent = text;
        el.className = 'fixed top-24 left-1/2 transform -translate-x-1/2 z-50 px-6 py-3 rounded-full shadow-lg text-xs font-semibold';
        el.classList.add(isError ? 'bg-red-600 text-white' : 'bg-slate-900 text-white');
        el.classList.remove('hidden');
        setTimeout(function() { el.classList.add('hidden'); }, 3000);
    }

    async function loadProfile() {
        try {
            var user = await authFetch('/api/auth/me');
            if (!user) return;
            document.getElementById('profile-username').textContent = user.username || '-';
            document.getElementById('profile-phone').textContent = user.phone || '-';
            if (user.username) {
                document.getElementById('profile-avatar').textContent = user.username.charAt(0).toUpperCase();
            }
            document.getElementById('profile-created').textContent = user.created_at || '-';
        } catch (err) {
            console.error('loadProfile error:', err);
        }
    }

    document.getElementById('family-bind-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        var name = document.getElementById('family-name').value.trim();
        var phone = document.getElementById('family-phone').value.trim();
        var relation = document.getElementById('family-relation').value;
        var msgEl = document.getElementById('bind-message');

        if (!name || !idcard) {
            msgEl.textContent = '请填写家属姓名和身份证号';
            msgEl.className = 'text-xs mt-3 text-red-500';
            msgEl.classList.remove('hidden');
            return;
        }

        try {
            var data = await authFetch('/api/user/family-bind', {
                method: 'POST',
                body: JSON.stringify({ name: name, phone: phone, relation: relation })
            });
            msgEl.textContent = '绑定成功';
            msgEl.className = 'text-xs mt-3 text-emerald-600';
            msgEl.classList.remove('hidden');
            document.getElementById('family-bind-form').reset();
            loadFamilyMembers();
            showToast('家属绑定成功');
        } catch (err) {
            msgEl.textContent = '网络错误，请稍后重试';
            msgEl.className = 'text-xs mt-3 text-red-500';
            msgEl.classList.remove('hidden');
        }
    });

    async function loadFamilyMembers() {
        var listEl = document.getElementById('family-list');
        var emptyEl = document.getElementById('family-empty');

        try {
            var data = await authFetch('/api/user/family');
            if (!data) return;
            var members = Array.isArray(data) ? data : (data.members || data.data || []);

            if (members.length === 0) {
                listEl.innerHTML = '';
                emptyEl.classList.remove('hidden');
                return;
            }
            emptyEl.classList.add('hidden');

            listEl.innerHTML = members.map(function(m) {
                return '<div class="p-4 rounded-xl border border-slate-200 bg-slate-50 hover:shadow-sm transition-all">' +
                    '<div class="flex items-center gap-3 mb-2">' +
                        '<span class="w-10 h-10 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center font-bold text-sm">' + (m.name ? m.name.charAt(0) : '?') + '</span>' +
                        '<div>' +
                            '<p class="font-bold text-slate-800">' + (m.name || '-') + '</p>' +
                            '<span class="text-xs px-2 py-0.5 rounded-full bg-amber-100 text-amber-800 font-bold">' + (m.relation || '-') + '</span>' +
                        '</div>' +
                    '</div>' +
                    '<p class="text-xs text-slate-400 mt-2">身份证：' + (m.id_card || m.id || '-') + '</p>' +
                '</div>';
            }).join('');
        } catch (err) {
            console.error('loadFamilyMembers error:', err);
            listEl.innerHTML = '<p class="text-slate-400 text-sm col-span-full text-center py-6">加载失败，请刷新重试</p>';
        }
    }

    async function loadOrders() {
        var tbody = document.getElementById('orders-table-body');
        var emptyEl = document.getElementById('orders-empty');

        try {
            var data = await authFetch('/api/services/orders?limit=5');
            if (!data) return;
            var orders = Array.isArray(data) ? data : (data.orders || data.data || []);

            if (orders.length === 0) {
                tbody.innerHTML = '';
                emptyEl.classList.remove('hidden');
                return;
            }
            emptyEl.classList.add('hidden');

            tbody.innerHTML = orders.map(function(o) {
                var statusClass = 'bg-blue-100 text-blue-800';
                if (o.status === '已完成' || o.status === 'completed') statusClass = 'bg-emerald-100 text-emerald-800';
                else if (o.status === '已取消' || o.status === 'cancelled') statusClass = 'bg-slate-100 text-slate-500';
                else if (o.status === '进行中' || o.status === 'in_progress') statusClass = 'bg-amber-100 text-amber-800';

                return '<tr class="hover:bg-slate-50">' +
                    '<td class="p-3 font-mono text-xs text-slate-500">' + (o.id || o.order_id || '-') + '</td>' +
                    '<td class="p-3 font-bold">' + (o.service_type || o.type || '-') + '</td>' +
                    '<td class="p-3">' + (o.elder_name || o.name || '-') + '</td>' +
                    '<td class="p-3 text-xs">' + (o.time || o.created_at || '-') + '</td>' +
                    '<td class="p-3">' +
                        '<span class="text-xs px-2 py-0.5 rounded-full font-bold ' + statusClass + '">' + (o.status || '待处理') + '</span>' +
                    '</td>' +
                '</tr>';
            }).join('');
        } catch (err) {
            console.error('loadOrders error:', err);
            tbody.innerHTML = '<tr><td colspan="5" class="p-3 text-center text-slate-400">加载失败，请刷新重试</td></tr>';
        }
    }

    loadProfile();
    loadFamilyMembers();
    loadOrders();
    </script>

</body>
</html>
