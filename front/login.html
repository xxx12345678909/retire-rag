<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 — 智慧养老AI辅助平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        warm: {
                            50: '#eff6ff',
                            100: '#dbeafe',
                            200: '#bfdbfe',
                            300: '#93c5fd',
                            400: '#60a5fa',
                            500: '#3b82f6',
                            600: '#1d4ed8',
                            700: '#1e40af',
                            800: '#1e3a8a',
                            900: '#172554',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Noto Sans SC', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #dbeafe 0%, #eff6ff 50%, #e0e7ff 100%);
            min-height: 100vh;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-md">
        <!-- 品牌标题 -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-warm-500 rounded-2xl shadow-lg mb-4">
                <span class="text-3xl">🏡</span>
            </div>
            <h1 class="text-2xl font-extrabold text-warm-800 tracking-wide">智慧养老AI辅助平台</h1>
            <p class="text-sm text-warm-400 mt-1">基于RAG知识检索增强的大健康养老服务</p>
        </div>

        <!-- 登录卡片 -->
        <div class="bg-white rounded-3xl shadow-xl border border-warm-100 p-8">
            <h2 class="text-xl font-bold text-warm-700 mb-6 text-center">用户登录</h2>

            <!-- 错误提示 -->
            <div id="error-box" class="hidden mb-4 p-3 bg-red-50 border border-red-200 text-red-700 text-sm rounded-xl"></div>

            <form id="login-form" class="space-y-5">
                <div>
                    <label for="username" class="block text-sm font-bold text-warm-600 mb-1.5">用户名</label>
                    <input
                        id="username"
                        type="text"
                        required
                        autocomplete="username"
                        placeholder="请输入用户名"
                        class="w-full px-4 py-3 border border-warm-200 rounded-xl text-sm outline-none focus:ring-2 focus:ring-warm-400 focus:border-warm-400 transition-all bg-warm-50/50 placeholder:text-warm-300"
                    >
                </div>

                <div>
                    <label for="password" class="block text-sm font-bold text-warm-600 mb-1.5">密码</label>
                    <input
                        id="password"
                        type="password"
                        required
                        autocomplete="current-password"
                        placeholder="请输入密码"
                        class="w-full px-4 py-3 border border-warm-200 rounded-xl text-sm outline-none focus:ring-2 focus:ring-warm-400 focus:border-warm-400 transition-all bg-warm-50/50 placeholder:text-warm-300"
                    >
                </div>

                <button
                    id="submit-btn"
                    type="submit"
                    class="w-full bg-warm-500 hover:bg-warm-600 active:bg-warm-700 text-white font-bold py-3 rounded-xl shadow-md hover:shadow-lg transition-all text-sm disabled:opacity-60 disabled:cursor-not-allowed"
                >
                    登 录
                </button>
            </form>

            <p class="text-center text-xs text-warm-400 mt-6">
                还没有账号？
                <a href="register.html" class="text-warm-500 hover:text-warm-700 font-bold underline underline-offset-2 transition-colors">
                    立即注册
                </a>
            </p>
        </div>

        <!-- 页脚 -->
        <p class="text-center text-xs text-warm-300 mt-6">
            &copy; 2026 智慧养老AI辅助平台 · 孝心常在
        </p>
    </div>

    <script src="shared.js"></script>
    <script>
        (function () {
            const form = document.getElementById("login-form");
            const errorBox = document.getElementById("error-box");
            const submitBtn = document.getElementById("submit-btn");

            function showError(msg) {
                errorBox.textContent = msg;
                errorBox.classList.remove("hidden");
            }

            function hideError() {
                errorBox.classList.add("hidden");
            }

            form.addEventListener("submit", async function (e) {
                e.preventDefault();
                hideError();

                const username = document.getElementById("username").value.trim();
                const password = document.getElementById("password").value;

                if (!username || !password) {
                    showError("请填写用户名和密码");
                    return;
                }

                submitBtn.disabled = true;
                submitBtn.textContent = "登录中...";

                try {
                    const result = await api("/api/auth/login", {
                        method: "POST",
                        body: { username, password },
                        auth: false,
                    });

                    // 存储令牌
                    localStorage.setItem("auth_token", result.token);
                    if (result.username) {
                        localStorage.setItem("username", result.username);
                    }
                    if (result.role) {
                        localStorage.setItem("role", result.role);
                    }

                    // 跳转到首页
                    window.location.href = "index.html";
                } catch (err) {
                    if (err.status === 401) {
                        showError("用户名或密码错误，请重试");
                    } else {
                        showError(err.message || "登录失败，请稍后重试");
                    }
                } finally {
                    submitBtn.disabled = false;
                    submitBtn.textContent = "登 录";
                }
            });
        })();
    </script>
</body>
</html>
