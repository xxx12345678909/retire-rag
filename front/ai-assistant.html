<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI助手 - 智慧养老云平台</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 min-h-screen flex flex-col">
<div id="navbar"></div>
<div class="flex-1 max-w-3xl mx-auto px-4 py-6 w-full flex flex-col">
  <h2 class="text-xl font-bold text-slate-800 mb-4">🤖 智慧养老AI助手</h2>
  <p class="text-sm text-slate-500 mb-4">政策咨询 · 服务导办 · 健康科普 · 操作指引</p>
  <div id="chat-box" class="flex-1 bg-white rounded-xl border border-slate-100 p-4 mb-4 overflow-y-auto space-y-3" style="min-height:400px;max-height:500px;">
    <div class="text-slate-400 text-center text-sm py-8">👋 您好！我是智慧养老AI助手，有什么可以帮您？</div>
  </div>
  <form id="chat-form" class="flex gap-2">
    <input id="chat-input" type="text" placeholder="输入您的问题，如：我爸75岁能领什么补贴..."
      class="flex-1 border border-slate-200 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-blue-400">
    <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-lg font-medium text-sm transition-all">
      <i class="fa-solid fa-paper-plane"></i> 发送
    </button>
  </form>
</div>
<script src="shared.js"></script>
<script>
const chatBox = document.getElementById('chat-box');
const form = document.getElementById('chat-form');
const input = document.getElementById('chat-input');

function addMsg(role, text) {
  const div = document.createElement('div');
  div.className = role === 'user'
    ? 'bg-blue-50 text-slate-800 rounded-lg p-3 text-sm ml-12'
    : 'bg-slate-50 text-slate-700 rounded-lg p-3 text-sm mr-12 border border-slate-100';
  div.innerHTML = '<div class="text-xs font-bold mb-1 ' + (role === 'user' ? 'text-blue-600' : 'text-emerald-600') + '">' + (role === 'user' ? '👴 您' : '🤖 AI助手') + '</div>' + text.replace(/\n/g, '<br>');
  chatBox.appendChild(div);
  chatBox.scrollTop = chatBox.scrollHeight;
}

form.addEventListener('submit', async e => {
  e.preventDefault();
  const q = input.value.trim();
  if (!q) return;
  addMsg('user', q);
  input.value = '';
  const loading = document.createElement('div');
  loading.className = 'text-slate-400 text-sm text-center';
  loading.textContent = '思考中...';
  chatBox.appendChild(loading);
  try {
    const r = await fetch(API_BASE + '/api/v1/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({query: q, session_id: 'web_' + Date.now()})
    });
    const d = await r.json();
    loading.remove();
    addMsg('ai', d.answer);
  } catch(err) {
    loading.remove();
    addMsg('ai', '抱歉，服务暂时不可用：' + err.message);
  }
});

document.addEventListener('DOMContentLoaded', () => renderNavbar());
</script>
</body>
</html>
