<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>政策大厅 - 智慧养老云平台</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 min-h-screen">
<div id="navbar"></div>
<div class="max-w-5xl mx-auto px-4 py-8">
  <h2 class="text-2xl font-bold text-slate-800 mb-6">📋 养老政策大厅</h2>
  <div id="policy-list" class="space-y-4">
    <p class="text-slate-400 text-center py-12">加载中...</p>
  </div>
</div>
<script src="shared.js"></script>
<script>
const API_BASE = 'http://localhost:8000';
document.addEventListener('DOMContentLoaded', async () => {
  renderNavbar();
  try {
    const resp = await fetch(API_BASE + '/api/policy/list');
    const data = await resp.json();
    const container = document.getElementById('policy-list');
    if (!data.categories || !data.categories.length) {
      container.innerHTML = '<p class="text-slate-400 text-center py-12">暂无政策数据</p>';
      return;
    }
    let html = '';
    data.categories.forEach(cat => {
      html += `<div class="bg-white rounded-xl border border-slate-100 p-5 shadow-sm">
        <h3 class="text-lg font-bold text-slate-800 mb-3">${cat.icon} ${cat.name}</h3>`;
      cat.policies.forEach(p => {
        html += `<div class="border-t border-slate-50 pt-3 mt-3">
          <p class="font-medium text-slate-700">${p.title}</p>
          <p class="text-sm text-slate-500 mt-1">${p.summary}</p>
          <p class="text-xs text-slate-400 mt-1">来源：${p.source}</p>
        </div>`;
      });
      html += '</div>';
    });
    container.innerHTML = html;
  } catch(e) {
    document.getElementById('policy-list').innerHTML = '<p class="text-slate-400 text-center py-12">加载失败：' + e.message + '</p>';
  }
});
</script>
</body>
</html>
